<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 180" width="400" height="180">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d1b4b;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="cupGold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#facc15" />
      <stop offset="50%" style="stop-color:#fde68a" />
      <stop offset="100%" style="stop-color:#ca8a04" />
    </linearGradient>
    <linearGradient id="cupBlue" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#38bdf8" />
      <stop offset="100%" style="stop-color:#0284c7" />
    </linearGradient>
    <linearGradient id="greenShine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4ade80" />
      <stop offset="100%" style="stop-color:#16a34a" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="3" stdDeviation="3" flood-color="#000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Background rounded rect -->
  <rect width="400" height="180" rx="20" fill="url(#bgGrad)"/>

  <!-- Decorative dots -->
  <circle cx="20" cy="20" r="2" fill="#38bdf8" opacity="0.4"/>
  <circle cx="380" cy="20" r="2" fill="#facc15" opacity="0.4"/>
  <circle cx="20" cy="160" r="2" fill="#4ade80" opacity="0.4"/>
  <circle cx="380" cy="160" r="2" fill="#38bdf8" opacity="0.4"/>
  <circle cx="200" cy="10" r="1.5" fill="#fde68a" opacity="0.5"/>

  <!-- ══ TROPHY CUP ══ -->
  <g transform="translate(52, 18)" filter="url(#shadow)">

    <!-- Handles -->
    <path d="M18,28 Q4,28 4,44 Q4,58 18,58" fill="none" stroke="url(#cupGold)" stroke-width="5" stroke-linecap="round"/>
    <path d="M62,28 Q76,28 76,44 Q76,58 62,58" fill="none" stroke="url(#cupGold)" stroke-width="5" stroke-linecap="round"/>

    <!-- Cup body -->
    <path d="M18,18 L62,18 L56,72 Q40,84 40,84 Q40,84 24,72 Z" fill="url(#cupBlue)"/>

    <!-- Cup shine -->
    <path d="M22,22 L36,22 L33,65 Q28,72 26,68 Z" fill="white" opacity="0.15"/>

    <!-- Gold rim top -->
    <rect x="15" y="14" width="50" height="8" rx="4" fill="url(#cupGold)"/>

    <!-- Stars on cup -->
    <text x="40" y="52" font-size="18" text-anchor="middle" fill="#facc15" filter="url(#glow)">★</text>

    <!-- Base stem -->
    <rect x="33" y="84" width="14" height="12" rx="2" fill="url(#cupGold)"/>

    <!-- Base platform -->
    <rect x="22" y="96" width="36" height="8" rx="4" fill="url(#cupGold)"/>

    <!-- Green accent line on base -->
    <rect x="22" y="100" width="36" height="2" rx="1" fill="url(#greenShine)" opacity="0.8"/>

  </g>

  <!-- ══ TEXT ══ -->
  <!-- Arabic main title -->
  <text x="235" y="72" 
    font-family="'Segoe UI', Arial, sans-serif" 
    font-size="34" 
    font-weight="900" 
    text-anchor="middle" 
    fill="url(#cupGold)"
    filter="url(#glow)"
    letter-spacing="1">صناديد</text>

  <!-- Subtitle -->
  <text x="235" y="112" 
    font-family="'Segoe UI', Arial, sans-serif" 
    font-size="28" 
    font-weight="700" 
    text-anchor="middle" 
    fill="url(#cupBlue)"
    letter-spacing="2">المعرفة</text>

  <!-- Green decorative underline -->
  <rect x="148" y="120" width="174" height="4" rx="2" fill="url(#greenShine)"/>

  <!-- Small stars decoration -->
  <text x="152" y="115" font-size="12" fill="#facc15" opacity="0.8">✦</text>
  <text x="308" y="115" font-size="12" fill="#facc15" opacity="0.8">✦</text>

  <!-- Blue glow dots around trophy -->
  <circle cx="52" cy="30" r="3" fill="#38bdf8" opacity="0.3"/>
  <circle cx="135" cy="100" r="3" fill="#4ade80" opacity="0.3"/>
</svg>
