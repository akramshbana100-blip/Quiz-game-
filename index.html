<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تحدي الفرق الذكي - إعداد أكرم</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="setup-section" class="container">
        <h1>إعداد فرق التحدي</h1>
        <div class="team-flex">
            <div class="team-card">
                <h3>الفريق الأول</h3>
                <input type="text" id="t1-name" placeholder="اسم الفريق">
                <textarea id="t1-members" placeholder="أسماء الأعضاء..."></textarea>
            </div>
            <div class="vs-circle">VS</div>
            <div class="team-card">
                <h3>الفريق الثاني</h3>
                <input type="text" id="t2-name" placeholder="اسم الفريق">
                <textarea id="t2-members" placeholder="أسماء الأعضاء..."></textarea>
            </div>
        </div>
        <button onclick="goToReady()" class="btn-start">دخول اللاعبين</button>
        <div class="admin-link">
            <button onclick="showAdminPanel()">إعدادات المدير</button>
        </div>
    </div>

    <div id="ready-section" class="container" style="display: none;">
        <h1 id="countdown-display">3</h1>
        <h2 id="match-up-text"></h2>
        <p>استعدوا... ستنطلق المسابقة الآن!</p>
    </div>

    <div id="game-section" class="container" style="display: none;">
        <div class="header-info">
            <div class="timer-box" id="timer-val">30</div>
        </div>
        <h2 id="question-text" class="question">انتظر قرار المدير لبدء السؤال...</h2>
        <div class="options-grid">
            <button class="opt-btn" id="opt0" onclick="checkAnswer(0)">-</button>
            <button class="opt-btn" id="opt1" onclick="checkAnswer(1)">-</button>
            <button class="opt-btn" id="opt2" onclick="checkAnswer(2)">-</button>
            <button class="opt-btn" id="opt3" onclick="checkAnswer(3)">-</button>
        </div>
    </div>

    <div id="admin-section" class="container" style="display: none;">
        <h1>لوحة تحكم المدير</h1>
        <div class="admin-controls">
            <p>أدخل كلمة السر لتوليد سؤال بذكاء Gemini</p>
            <input type="password" id="admin-key" placeholder="كلمة السر (1234)">
            <button id="ai-btn" class="btn-ai" onclick="generateWithGemini()">توليد سؤال جديد ✨</button>
            <button onclick="backToGame()" class="btn-back">عودة للرئيسية</button>
        </div>
        <div id="status-msg" style="margin-top:15px; color: #f39c12; font-weight: bold;"></div>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
